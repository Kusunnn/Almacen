<div class="flex flex-center register-shell">
  <div class="card register-card">
    <h2>Registrar usuario</h2>

    <form (ngSubmit)="onSubmit()" class="register-form">
      <input
        class="input-base"
        type="text"
        name="nombre"
        [(ngModel)]="form.nombre"
        placeholder="Nombre completo"
        required
      />

      <input
        class="input-base"
        type="number"
        name="edad"
        [(ngModel)]="form.edad"
        placeholder="Edad"
        min="0"
        required
      />

      <input
        class="input-base"
        type="text"
        name="telefono"
        [(ngModel)]="form.telefono"
        placeholder="Teléfono"
        required
      />

      <input
        class="input-base"
        type="text"
        name="direccion"
        [(ngModel)]="form.direccion"
        placeholder="Dirección"
        required
      />

      <input
        class="input-base"
        type="email"
        name="correo"
        [(ngModel)]="form.correo"
        placeholder="Correo"
        required
      />

      <input
        class="input-base"
        type="password"
        name="contrasena"
        [(ngModel)]="form.contrasena"
        placeholder="Contraseña"
        required
      />

      <select
        class="input-base"
        name="idRol"
        [(ngModel)]="form.idRol"
        [disabled]="loadingRoles"
        required>
        <option [ngValue]="null">Selecciona un rol</option>
        <option *ngFor="let role of roles" [ngValue]="role.id">
          {{ role.nombre }}
        </option>
      </select>

      <div class="photo-field">
        <label class="photo-label" for="fotoPerfil">Foto de perfil (opcional)</label>
        <input
          class="input-base"
          id="fotoPerfil"
          type="file"
          name="fotoPerfil"
          accept="image/*"
          (change)="onPhotoSelected($event)"
        />
        <p class="photo-help">Selecciona una imagen JPG, PNG, WEBP o similar de hasta 1.5 MB.</p>

        <div *ngIf="photoPreview" class="photo-preview">
          <img [src]="photoPreview" alt="Vista previa de la foto de perfil" />
          <div class="photo-preview__meta">
            <span>{{ selectedPhotoName }}</span>
            <button class="btn btn-secondary" type="button" (click)="clearPhoto()">
              Quitar foto
            </button>
          </div>
        </div>
      </div>

      <button class="btn btn-primary" type="submit" [disabled]="submitting || loadingRoles">
        {{ submitting ? 'Guardando...' : 'Crear usuario' }}
      </button>

      <a class="register-link" routerLink="/login">Volver al login</a>

      <div *ngIf="success" class="success">{{ success }}</div>
      <div *ngIf="error" class="error">{{ error }}</div>
    </form>
  </div>
</div>
